name: dbt tests

on:
  pull_request:
    paths:
      - 'dbt/**'
      - 'extract/**'
      - 'load/**'

jobs:
  dbt-test:
    name: Run dbt tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-bigquery==1.7.*

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          uk_housing_pipeline:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account-json
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: staging
                threads: 4
                timeout_seconds: 300
                location: europe-west2
                keyfile_json: ${{ secrets.GCP_SA_KEY }}
          EOF

      - name: dbt deps
        run: dbt deps --project-dir dbt

      - name: dbt compile (smoke check)
        run: dbt compile --project-dir dbt

      - name: dbt run — staging
        run: dbt run --select staging --project-dir dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: dbt test — staging
        run: dbt test --select staging --project-dir dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: dbt run — intermediate + marts
        run: dbt run --select intermediate marts --project-dir dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: dbt test — full suite
        run: dbt test --project-dir dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
